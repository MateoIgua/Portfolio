<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mateo | Portafolio</title>
    <meta name="description" content="Portafolio personal de Mateo: proyectos, sobre mí y blog." />
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Portfolio.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        // Apply theme before render to avoid flash of wrong theme
        (function () {
            try {
                var stored = localStorage.getItem('portfolio-theme');
                var theme = stored
                    || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <div id="app">
        <div class="app-loading">
            <svg class="loading-progress" viewBox="0 0 50 50">
                <circle r="20" cx="25" cy="25" />
                <circle r="20" cx="25" cy="25" />
            </svg>
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocurrió un error inesperado.
        <a href="." class="reload">Recargar</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
